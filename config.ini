; ============================================================
; FPV Hunter Pro v8.0 - Конфигурационный файл
; ============================================================

[PlutoSDR]
; IP-адрес Pluto SDR (по умолчанию 192.168.2.1)
PlutoIP = 192.168.2.1

; Частота дискретизации (МГц) - 0.5 до 61.44
SampleRate = 4.0

; Полоса пропускания (МГц) - 0.2 до 56
Bandwidth = 4.0

; Усиление RX1 (дБ) - -3 до 71
Gain = 40

; Усиление RX2 (дБ) - -3 до 71
Gain2 = 40

; AGC RX1 (true/false)
AGC = false

; AGC RX2 (true/false)
AGC2 = false

; DC Offset Tracking (true/false)
DCTracking = true

; Quadrature Tracking (true/false)
QuadTracking = true

[Scanning]
; Начальная частота (МГц)
StartFreq = 70

; Конечная частота (МГц)
StopFreq = 6000

; Шаг сканирования (МГц)
Step = 5.0

[Video]
; Разрешение по ширине (пиксели)
VideoWidth = 640

; Разрешение по высоте (пиксели)
VideoHeight = 480

; Кадров в секунду
FPS = 30

[Recording]
; Автозапись (true/false)
AutoRecord = true

; Порог записи (dBFS)
RecordThreshold = -35

; Порог остановки (dBFS)
StopThreshold = -60

[Voice]
; Голосовые оповещения (true/false)
VoiceAlerts = true

; Громкость голоса (0-100)
VoiceVolume = 80

; Звуковые оповещения (true/false)
SoundAlerts = true

[Paths]
; Путь для сохранения файлов
SavePath = C:\Users\%USERNAME%\Documents\FPV_Captures

[UI]
; Показывать спектр (true/false)
ShowSpectrum = true

; Показывать водопад (true/false)
ShowWaterfall = true

; Показывать частоты (true/false)
ShowFrequencies = true

; Размер спектра (256, 512, 1024, 2048)
SpectrumSize = 1024
