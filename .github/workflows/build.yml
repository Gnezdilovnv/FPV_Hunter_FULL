name: Build FPV Hunter FULL

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Restore
        run: dotnet restore

      - name: Publish Self-Contained
        run: dotnet publish -c Release -r win-x64 --self-contained true -o publish

      - name: Download libiio.dll
        run: curl -L -o publish/libiio.dll https://github.com/analogdevicesinc/libiio/releases/download/v0.24/libiio.dll

      - name: Download OpenCvSharpExtern.dll
        run: |
          curl -L -o opencv.zip https://www.nuget.org/api/v2/package/OpenCvSharp4.runtime.win/4.8.0.20230708
          unzip -j opencv.zip "runtimes/win-x64/native/OpenCvSharpExtern.dll" -d publish/

      - name: Download FFmpeg DLLs
        run: |
          curl -L -o ffmpeg.7z https://www.gyan.dev/ffmpeg/builds/ffmpeg-git-full.7z
          7z x ffmpeg.7z -y
          cp ffmpeg-*/bin/*.dll publish/

      - name: Check all DLLs
        run: |
          echo "=== CHECKING DLLs ==="
          Get-ChildItem publish\*.dll
          if (Test-Path publish\libiio.dll) { Write-Host "✅ libiio.dll" } else { Write-Host "❌ libiio.dll" }
          if (Test-Path publish\OpenCvSharpExtern.dll) { Write-Host "✅ OpenCvSharpExtern.dll" } else { Write-Host "❌ OpenCvSharpExtern.dll" }
          if (Test-Path publish\avcodec-*.dll) { Write-Host "✅ FFmpeg DLLs found" } else { Write-Host "❌ FFmpeg DLLs missing" }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FPV_Hunter_FULL
          path: publish/
