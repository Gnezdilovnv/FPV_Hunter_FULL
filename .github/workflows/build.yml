name: Build FPV Hunter FULL

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build project
        run: dotnet build -c Release --no-restore

      - name: Copy all files to publish
        run: |
          New-Item -ItemType Directory -Force -Path publish
          Copy-Item -Path bin\Release\net48\*.* -Destination publish\ -Recurse -Force
          if (Test-Path libs\*.dll) {
            Copy-Item -Path libs\*.dll -Destination publish\ -Force
            Write-Host "✅ All DLLs copied from libs"
          } else {
            Write-Host "❌ libs folder not found or empty"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FPV_Hunter_FULL
          path: publish/
