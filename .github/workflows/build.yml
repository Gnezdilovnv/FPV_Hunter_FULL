name: Build FPV Hunter FULL

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build project
        run: dotnet build -c Release --no-restore

      - name: Download all DLLs from Release
        run: |
          New-Item -ItemType Directory -Force -Path publish
          Copy-Item -Path bin\Release\net48\*.exe -Destination publish\ -Force
          Copy-Item -Path bin\Release\net48\*.config -Destination publish\ -Force
          Copy-Item -Path config.ini -Destination publish\ -Force
          $dlls = @(
            "libiio.dll",
            "OpenCvSharpExtern.dll",
            "avcodec-62.dll",
            "avformat-62.dll",
            "avutil-60.dll",
            "swscale-9.dll",
            "swresample-6.dll",
            "avfilter-11.dll",
            "avdevice-62.dll"
          )
          foreach ($dll in $dlls) {
            $url = "https://github.com/Gnezdilovnv/FPV_Hunter_FULL/releases/download/v8.0/$dll"
            Write-Host "Скачивание $dll..."
            Invoke-WebRequest -Uri $url -OutFile "publish/$dll"
            if (Test-Path "publish/$dll") {
              Write-Host "✅ $dll скачан"
            } else {
              Write-Host "❌ $dll не скачан"
            }
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FPV_Hunter_FULL
          path: publish/
