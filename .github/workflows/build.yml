name: Build FPV Hunter FULL

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Restore
        run: dotnet restore

      - name: Publish Self-Contained
        run: dotnet publish -c Release -r win-x64 --self-contained true -o publish

      - name: Download libiio.dll
        run: curl -L -o publish/libiio.dll https://github.com/analogdevicesinc/libiio/releases/download/v0.24/libiio.dll

      - name: Download OpenCvSharpExtern.dll
        run: |
          curl -L -o opencv.zip https://www.nuget.org/api/v2/package/OpenCvSharp4.runtime.win/4.8.0.20230708
          unzip -j opencv.zip "runtimes/win-x64/native/OpenCvSharpExtern.dll" -d publish/

      - name: Download FFmpeg DLLs
        run: |
          curl -L -o ffmpeg.7z https://www.gyan.dev/ffmpeg/builds/packages/ffmpeg-6.1.1-full_build.7z
          7z x ffmpeg.7z -y
          cp ffmpeg-*/bin/*.dll publish/

      - name: Check all DLLs
        run: |
          echo "=== CHECKING DLLs ==="
          dir publish\*.dll
          if exist publish\libiio.dll (echo ✅ libiio.dll) else (echo ❌ libiio.dll)
          if exist publish\OpenCvSharpExtern.dll (echo ✅ OpenCvSharpExtern.dll) else (echo ❌ OpenCvSharpExtern.dll)
          if exist publish\avcodec-58.dll (echo ✅ avcodec-58.dll) else (echo ❌ avcodec-58.dll)
          if exist publish\avformat-58.dll (echo ✅ avformat-58.dll) else (echo ❌ avformat-58.dll)
          if exist publish\avutil-56.dll (echo ✅ avutil-56.dll) else (echo ❌ avutil-56.dll)
          if exist publish\swscale-5.dll (echo ✅ swscale-5.dll) else (echo ❌ swscale-5.dll)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FPV_Hunter_FULL
          path: publish/
