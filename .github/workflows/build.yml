name: Build FPV Hunter FULL

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Restore
        run: dotnet restore

      - name: Publish Self-Contained
        run: dotnet publish -c Release -r win-x64 --self-contained true -o publish

      - name: Download libiio.dll
        run: curl -L -o publish/libiio.dll https://github.com/analogdevicesinc/libiio/releases/download/v0.24/libiio.dll

      - name: Download OpenCvSharpExtern.dll
        run: |
          curl -L -o opencv.zip https://www.nuget.org/api/v2/package/OpenCvSharp4.runtime.win/4.8.0.20230708
          unzip -j opencv.zip "runtimes/win-x64/native/OpenCvSharpExtern.dll" -d publish/

      - name: Download FFmpeg DLLs (alternative link)
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n6.0-latest-win64-gpl-shared-6.0.zip
          7z x ffmpeg.zip -y
          cp ffmpeg-*/bin/*.dll publish/ 2>nul || cp ffmpeg-n6.0-latest-win64-gpl-shared-6.0/bin/*.dll publish/ 2>nul || echo "FFmpeg DLLs not found"

      - name: Check all DLLs
        run: |
          echo "=== CHECKING DLLs ==="
          dir publish\*.dll
          if exist publish\libiio.dll (echo ✅ libiio.dll) else (echo ❌ libiio.dll)
          if exist publish\OpenCvSharpExtern.dll (echo ✅ OpenCvSharpExtern.dll) else (echo ❌ OpenCvSharpExtern.dll)
          if exist publish\avcodec-*.dll (echo ✅ FFmpeg DLLs found) else (echo ❌ FFmpeg DLLs missing)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FPV_Hunter_FULL
          path: publish/
