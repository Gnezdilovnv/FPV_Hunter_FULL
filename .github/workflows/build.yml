name: Build FPV Hunter FULL

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build project
        run: dotnet build -c Release --no-restore

      - name: Copy native DLLs
        run: |
          mkdir publish
          copy bin\Release\net48\*.* publish\
          if exist libs\*.dll copy libs\*.dll publish\
          echo "✅ All files copied to publish"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FPV_Hunter_FULL
          path: publish/
