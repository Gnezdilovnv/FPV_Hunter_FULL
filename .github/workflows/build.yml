name: Build FPV Hunter FULL

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore FPV_Hunter_FULL.sln

      - name: Build project
        run: msbuild FPV_Hunter_FULL.csproj /p:Configuration=Release /p:DeployOnBuild=true /p:PublishDir=./publish

      - name: Copy native DLLs
        run: |
          mkdir publish\native
          copy libs\*.dll publish\native\
          copy publish\native\*.* publish\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FPV_Hunter_FULL
          path: publish/
